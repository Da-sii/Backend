<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성분 가이드 삭제</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 60px auto;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        .btn-group {
            margin-top: 30px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .btn-cancel {
            background: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        "{{ guide.ingredient.name }}"<br>
        성분 가이드를 삭제하시겠습니까?
    </h2>

    <form method="POST">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn btn-delete">삭제</button>
            <a href="{% url 'admin_ingredient_guide_form' %}" class="btn btn-cancel">취소</a>
        </div>
    </form>
</div>

</body>
</html>
