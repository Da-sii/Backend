<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>중분류 카테고리 수정</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        h1 { margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #4caf50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .messages { margin-bottom: 20px; }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .success { background:#d4edda; color:#155724; }
        .error { background:#f8d7da; color:#721c24; }

        .nav-links { margin-bottom: 20px; }
        .nav-links a {
            color: #2196f3;
            text-decoration: none;
            margin-right: 15px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="nav-links">
        <a href="{% url 'admin_middle_category_form' %}">← 중분류 목록</a>
    </div>

    <h1>중분류 카테고리 수정</h1>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>대분류 선택</label>
            <select name="bigCategory" required>
                <option value="">-- 대분류 선택 --</option>
                {% for big in big_categories %}
                    <option value="{{ big.id }}"
                        {% if big.id == middle_category.big_category.id %}selected{% endif %}>
                        {{ big.category }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>중분류 이름</label>
            <input type="text"
                   name="category"
                   value="{{ middle_category.category }}"
                   required>
        </div>

        <button type="submit">저장하기</button>
    </form>
</div>
</body>
</html>
