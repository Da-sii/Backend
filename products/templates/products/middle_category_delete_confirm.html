<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>중분류 삭제 확인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
            text-align: center;
        }
        h1 { margin-bottom: 20px; }

        .danger {
            color: #f44336;
            font-weight: bold;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            margin: 0 6px;
        }

        .btn-delete { background:#f44336; color:#fff; }
        .btn-cancel { background:#9e9e9e; color:#fff; }
    </style>
</head>
<body>
<div class="container">

    <h1>중분류 삭제</h1>

    <p class="danger">
        정말로<br>
        <strong>
            [{{ category.big_category.category }}] {{ category.category }}
        </strong><br>
        중분류를 삭제하시겠습니까?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-delete">삭제</button>
        <a href="{% url 'admin_middle_category_form' %}">
            <button type="button" class="btn-cancel">취소</button>
        </a>
    </form>

</div>
</body>
</html>
